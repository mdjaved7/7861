  <!-- ============================================================
       SUPABASE CDN — No Node.js server needed
       Uses global `supabase` variable: supabase.createClient(...)
       ============================================================ -->

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      color: #ffffff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }

    /* Animations */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
      50%      { box-shadow: 0 0 35px rgba(59, 130, 246, 0.35); }
    }

    .tab-content    { animation: fadeSlideUp 0.35s ease-out; }
    .hero-card      { animation: fadeIn 0.5s ease-out, pulseGlow 3s ease-in-out infinite; }
    .neon-glow      { text-shadow: 0 0 40px rgba(59, 130, 246, 0.3); }

    .pill-active {
      background: #3b82f6 !important;
      color: #fff !important;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    /* Custom file input styling */
    .file-input-custom {
      position: relative;
      cursor: pointer;
    }
    .file-input-custom input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      cursor: pointer;
    }
  </style>
</head>

  // -- Star Rating --

    const starSize = size === 'small' ? 'w-3 h-3' : 'w-3.5 h-3.5';
    return (
      <div className="flex items-center gap-1">
        <Icons.Star className={`${starSize} text-amber-400`} />
        <span className="text-xs font-semibold text-amber-400">{rating?.toFixed(1) || '5.0'}</span>
      </div>
    );
  }

  // -- Bottom Navigation --
  function BottomNav({ activeTab, setActiveTab, hasSupabase }) {
    const tabs = [
      { id: 'home',    label: 'Home',    labelHi: 'होम',       icon: Icons.Home },
      { id: 'library', label: 'Library', labelHi: 'लाइब्रेरी', icon: Icons.Library },
      { id: 'profile', label: 'Profile', labelHi: 'प्रोफ़ाइल', icon: Icons.Profile },
    ];

    // Only show Admin tab if Supabase is configured
    if (hasSupabase) {
      tabs.push({ id: 'admin', label: 'Admin', labelHi: 'एडमिन', icon: Icons.Admin });
    }

    return (
      <nav className="fixed bottom-0 left-0 right-0 z-50 bg-black/95 backdrop-blur-xl border-t border-white/5">
        <div className="max-w-2xl mx-auto flex items-center justify-around px-2">
          {tabs.map(tab => {
            const isActive = activeTab === tab.id;
            const Icon = tab.icon;
            return (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex flex-col items-center gap-0.5 py-2.5 px-4 transition-all relative min-w-[64px] ${
                  isActive ? 'text-blue-500' : 'text-gray-500'
                }`}
              >
                <Icon className={`w-6 h-6 transition-all ${isActive ? 'scale-110' : ''}`} />
                <span className="text-[10px] font-semibold tracking-tight">
                  {tab.labelHi}

                {isActive && (
                  <span className="absolute -top-[1px] left-1/2 -translate-x-1/2 w-8 h-[3px] bg-blue-500 rounded-full shadow-lg shadow-blue-500/50" />
                )}
              </button>
            );
          })}

      </nav>
    );

  // -- Genre Pills --

                : 'text-gray-400 hover:text-white'

            onClick={() => setContentType('audio')}

              contentType === 'audio'
                ? 'bg-blue-500 text-white shadow-md shadow-blue-500/30'
                : 'text-gray-400 hover:text-white'

        <div className="flex gap-2 overflow-x-auto scrollbar-hide -mx-4 px-4">
          {genres.map(g => (
            <button

                  : 'bg-[#121212] text-gray-400 border-white/5 hover:border-white/10 hover:text-white'
              }`}

  // -- ADMIN TAB (Full CRUD with Supabase) --
  function AdminTab({ onStoryPublished, supabaseReady }) {
    const [title, setTitle] = useState('');
    const [author, setAuthor] = useState('');
    const [genre, setGenre] = useState('Horror');
    const [imageFile, setImageFile] = useState(null);
    const [audioFile, setAudioFile] = useState(null);
    const [publishing, setPublishing] = useState(false);
    const [status, setStatus] = useState({ type: '', message: '' });

    const resetForm = () => {
      setTitle('');
      setAuthor('');
      setGenre('Horror');
      setImageFile(null);
      setAudioFile(null);
      // Reset file inputs
      document.querySelectorAll('.file-input-custom input[type="file"]').forEach(el => { el.value = ''; });
    };

    const handlePublish = async (e) => {
      e.preventDefault();
      setStatus({ type: '', message: '' });

      // Validate
      if (!title.trim()) { setStatus({ type: 'error', message: '❌ Story title is required.' }); return; }
      if (!author.trim()) { setStatus({ type: 'error', message: '❌ Author name is required.' }); return; }
      if (!imageFile) { setStatus({ type: 'error', message: '❌ Please select an image file.' }); return; }

      if (!supabaseReady) {
        setStatus({ type: 'error', message: '❌ Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY at the top of the file.' });
        return;
      }

      setPublishing(true);
      setStatus({ type: 'info', message: '⏳ Uploading files to Supabase...' });

      try {
        const timestamp = Date.now();
        const randomStr = Math.random().toString(36).substring(2, 8);
        const ext = (name) => name.split('.').pop();

        // 1. Upload image to 'story-images' bucket
        const imgFileName = `stories/${timestamp}_${randomStr}.${ext(imageFile.name)}`;
        const { data: imgData, error: imgError } = await supabaseClient.storage
          .from('story-images')
          .upload(imgFileName, imageFile, { cacheControl: '3600', upsert: false });

        if (imgError) throw new Error(`Image upload failed: ${imgError.message}`);

        // Get public URL for image
        const { data: imgPublicUrl } = supabaseClient.storage
          .from('story-images')
          .getPublicUrl(imgFileName);
        const imageUrl = imgPublicUrl.publicUrl;

        let audioUrl = '';
        // 2. Upload audio if provided
        if (audioFile) {
          setStatus({ type: 'info', message: '⏳ Uploading audio file...' });
          const audioFileName = `stories/${timestamp}_${randomStr}.${ext(audioFile.name)}`;
          const { data: audData, error: audError } = await supabaseClient.storage
            .from('story-audios')
            .upload(audioFileName, audioFile, { cacheControl: '3600', upsert: false });

          if (audError) throw new Error(`Audio upload failed: ${audError.message}`);

          const { data: audPublicUrl } = supabaseClient.storage
            .from('story-audios')
            .getPublicUrl(audioFileName);
          audioUrl = audPublicUrl.publicUrl;
        }

        // 3. Insert record into 'stories' table
        setStatus({ type: 'info', message: '⏳ Saving story to database...' });
        const { data: insertData, error: insertError } = await supabaseClient
          .from('stories')
          .insert([
            {
              title: title.trim(),
              author: author.trim(),
              genre: genre,
              image_url: imageUrl,
              audio_url: audioUrl,
              rating: 5.0,
              listens: '0',
              episodes: 1,
              featured: false,
              isNew: true,
            }
          ])
          .select();

        if (insertError) throw new Error(`Database insert failed: ${insertError.message}`);

        setStatus({ type: 'success', message: `✅ "${title}" published successfully!` });
        resetForm();
        if (onStoryPublished) onStoryPublished();
      } catch (err) {
        console.error('Publish error:', err);
        setStatus({ type: 'error', message: `❌ ${err.message}` });
      } finally {
        setPublishing(false);
      }
    };

    return (
      <div className="tab-content">
        <div className="mb-6">
          <h2 className="text-xl font-bold text-white mb-1">Admin Panel</h2>
          <p className="text-xs text-gray-500">Publish new stories to the platform</p>
        </div>

        {!supabaseReady && (
          <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4 mb-6">
            <p className="text-yellow-400 text-sm font-medium">⚠️ Supabase Not Configured</p>
            <p className="text-yellow-500/60 text-xs mt-1">Set your <code className="bg-black/30 px-1 rounded text-yellow-300">SUPABASE_URL</code> and <code className="bg-black/30 px-1 rounded text-yellow-300">SUPABASE_ANON_KEY</code> at the top of the file to enable admin features.</p>
          </div>
        )}

        <form onSubmit={handlePublish} className="bg-[#121212] rounded-2xl border border-white/5 p-5 space-y-4">
          {/* Story Title */}
          <div>
            <label className="text-xs font-medium text-gray-400 mb-1.5 block">Story Title *</label>
            <input
              type="text"
              value={title}
              onChange={e => setTitle(e.target.value)}
              placeholder="e.g. Bhootiya Bangla"
              className="w-full bg-[#1a1a1a] text-white text-sm rounded-xl px-4 py-3 border border-white/5 focus:border-blue-500/50 focus:outline-none transition-all placeholder-gray-600"
            />
          </div>

          {/* Author Name */}
          <div>
            <label className="text-xs font-medium text-gray-400 mb-1.5 block">Author Name *</label>
            <input
              type="text"
              value={author}
              onChange={e => setAuthor(e.target.value)}
              placeholder="e.g. Mayank Sinha"
              className="w-full bg-[#1a1a1a] text-white text-sm rounded-xl px-4 py-3 border border-white/5 focus:border-blue-500/50 focus:outline-none transition-all placeholder-gray-600"
            />
          </div>

          {/* Genre Select */}
          <div>
            <label className="text-xs font-medium text-gray-400 mb-1.5 block">Genre</label>
            <select
              value={genre}
              onChange={e => setGenre(e.target.value)}
              className="w-full bg-[#1a1a1a] text-white text-sm rounded-xl px-4 py-3 border border-white/5 focus:border-blue-500/50 focus:outline-none transition-all"
            >
              <option value="Horror">Horror</option>
              <option value="Romance">Romance</option>
              <option value="Fantasy">Fantasy</option>
              <option value="General">General</option>
            </select>
          </div>

          {/* Image Upload */}
          <div>
            <label className="text-xs font-medium text-gray-400 mb-1.5 block">Cover Image *</label>
            <div className="file-input-custom w-full bg-[#1a1a1a] rounded-xl border border-dashed border-white/10 hover:border-blue-500/30 transition-colors">
              <input
                type="file"
                accept="image/*"
                onChange={e => setImageFile(e.target.files[0])}
              />
              <div className="px-4 py-8 flex flex-col items-center gap-2">
                <Icons.Upload className="w-6 h-6 text-gray-500" />
                {imageFile ? (
                  <p className="text-xs text-blue-400 font-medium">{imageFile.name}</p>
                ) : (
                  <>
                    <p className="text-xs text-gray-500">Tap to upload cover image</p>
                    <p className="text-[10px] text-gray-600">JPG, PNG, WebP</p>
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Audio Upload */}
          <div>
            <label className="text-xs font-medium text-gray-400 mb-1.5 block">Audio File (optional)</label>
            <div className="file-input-custom w-full bg-[#1a1a1a] rounded-xl border border-dashed border-white/10 hover:border-blue-500/30 transition-colors">
              <input
                type="file"
                accept=".mp3,.wav,.ogg,.m4a"
                onChange={e => setAudioFile(e.target.files[0])}
              />
              <div className="px-4 py-8 flex flex-col items-center gap-2">
                <Icons.MusicNote className="w-6 h-6 text-gray-500" />
                {audioFile ? (
                  <p className="text-xs text-blue-400 font-medium">{audioFile.name}</p>
                ) : (
                  <>
                    <p className="text-xs text-gray-500">Tap to upload MP3/WAV audio</p>
                    <p className="text-[10px] text-gray-600">MP3, WAV, OGG, M4A</p>
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Status Message */}
          {status.message && (
            <div className={`px-4 py-3 rounded-xl text-xs font-medium ${
              status.type === 'error' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
              status.type === 'success' ? 'bg-green-500/10 text-green-400 border border-green-500/20' :
              'bg-blue-500/10 text-blue-400 border border-blue-500/20'
            }`}>
              {status.message}
            </div>
          )}

          {/* Publish Button */}
          <button
            type="submit"
            disabled={publishing || !supabaseReady}
            className={`w-full py-3.5 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 ${
              publishing || !supabaseReady
                ? 'bg-gray-800 text-gray-500 cursor-not-allowed'
                : 'bg-blue-500 text-white hover:bg-blue-600 shadow-lg shadow-blue-500/25'
            }`}
          >
            {publishing ? (
              <>
                <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                Publishing...
              </>
            ) : (
              <>
                <Icons.Upload className="w-4 h-4" />
                Publish Story
              </>
            )}
          </button>
        </form>

        <div className="h-8" />
      </div>
    );
  }

  // ===============================================================
  //  AUDIO PLAYBACK MANAGER
  // ===============================================================
  function AudioPlayer({ currentTrack, onClose }) {
    const audioRef = useRef(null);
    const [playing, setPlaying] = useState(true);

    useEffect(() => {
      if (currentTrack && audioRef.current) {
        audioRef.current.play().catch(() => setPlaying(false));
        setPlaying(true);
      }
    }, [currentTrack]);

    const togglePlay = () => {
      if (!audioRef.current) return;
      if (playing) {
        audioRef.current.pause();
      } else {
        audioRef.current.play().catch(() => {});
      }
      setPlaying(!playing);
    };

    if (!currentTrack || !currentTrack.audio_url) return null;

    return (
      <div className="fixed bottom-16 left-0 right-0 z-40 px-4 animate-fadeSlideUp">
        <div className="max-w-2xl mx-auto bg-[#1a1a1a] border border-white/10 rounded-2xl p-3 backdrop-blur-xl shadow-2xl shadow-blue-500/10">
          <div className="flex items-center gap-3">
            <img
              src={currentTrack.image_url}
              alt={currentTrack.title}
              className="w-10 h-10 rounded-lg object-cover flex-shrink-0"
              onError={e => { e.target.src = 'https://placehold.co/40x40/1e1e2e/3b82f6?text=AS&font=raleway'; }}
            />
            <div className="flex-1 min-w-0">
              <p className="text-xs font-semibold text-white truncate">{currentTrack.title}</p>
              <p className="text-[10px] text-gray-500 truncate">{currentTrack.author}</p>
            </div>
            <button onClick={togglePlay} className="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
              {playing ? <Icons.Pause className="w-4 h-4 text-white" /> : <Icons.Play className="w-4 h-4 text-white ml-0.5" />}
            </button>
            <button onClick={onClose} className="text-gray-500 hover:text-white transition-colors">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
          <audio
            ref={audioRef}
            src={currentTrack.audio_url}
            onEnded={() => setPlaying(false)}
            className="hidden"
          />
        </div>
      </div>
    );
  }

  // ===============================================================
  //  🏠 APP ROOT
  // ===============================================================
  function App() {
    const [activeTab, setActiveTab] = useState('home');
    const [searchQuery, setSearchQuery] = useState('');
    const [activeGenre, setActiveGenre] = useState('✨ All');
    const [contentType, setContentType] = useState('audio');

    // Dynamic stories state
    const [stories, setStories] = useState([]);
    const [loading, setLoading] = useState(true);

    // Audio player state
    const [currentTrack, setCurrentTrack] = useState(null);

    const supabaseReady = supabaseClient !== null;

    // ========== FETCH STORIES FROM SUPABASE ==========
    const fetchStories = async () => {
      if (!supabaseReady) {
        // Use fallback data when Supabase not configured
        setStories(FALLBACK_STORIES);
        setLoading(false);
        return;
      }

      try {
        setLoading(true);
        const { data, error } = await supabaseClient
          .from('stories')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (data && data.length > 0) {
          // Mark first one as featured for display
          const enriched = data.map((s, i) => ({
            ...s,
            featured: i === 0,
            isNew: i < 3,
            id: s.id,
          }));
          setStories(enriched);
        } else {
          // Empty database — show nothing
          setStories([]);
        }
      } catch (err) {
        console.error('Error fetching stories:', err);
        // Fallback to demo data on error
        setStories(FALLBACK_STORIES);
      } finally {
        setLoading(false);
      }
    };

    // Fetch on mount
    useEffect(() => {
      fetchStories();
    }, []);

    // ========== PLAY AUDIO HANDLER ==========
    const handlePlay = (story) => {
      if (story.audio_url) {
        setCurrentTrack(story);
      } else {
        // No audio — show a toast or alert
        setStatus({ type: 'info', message: `📖 "${story.title}" has no audio yet.` });
      }
    };

    const [status, setStatus] = useState({ type: '', message: '' });

    // ========== HANDLE NEW PUBLICATION ==========
    const handleStoryPublished = () => {
      // Re-fetch stories from Supabase so homepage updates instantly
      fetchStories();
      // Switch to Home tab so user sees the new story
      setActiveTab('home');
    };

    // ========== RENDER ==========
    return (
      <div className="min-h-screen bg-black text-white">
        <TopHeader searchQuery={searchQuery} setSearchQuery={setSearchQuery} />

        {/* Supabase warning banner */}
        {!supabaseReady && (
          <div className="fixed top-[68px] left-0 right-0 z-40 bg-yellow-500/10 border-b border-yellow-500/20 backdrop-blur-xl">
            <div className="max-w-2xl mx-auto px-4 py-2">
              <p className="text-[11px] text-yellow-400 text-center">
                ⚠️ Demo Mode — Set your Supabase credentials at the top of this file to enable Admin &amp; dynamic data.
              </p>
            </div>
          </div>
        )}

        {/* Status toast */}
        {status.message && (
          <div className="fixed top-[104px] left-0 right-0 z-40 px-4">
            <div className={`max-w-2xl mx-auto px-4 py-2.5 rounded-xl text-xs font-medium text-center ${
              status.type === 'error' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
              'bg-blue-500/10 text-blue-400 border border-blue-500/20'
            }`}>
              {status.message}
            </div>
          </div>
        )}

        {/* Main Content */}
        <main className={`pt-[${supabaseReady ? '68px' : '104px'}] pb-[68px] px-4 max-w-2xl mx-auto`}
             style={{ paddingTop: supabaseReady ? '68px' : '104px' }}>
          {activeTab === 'home' && (
            <HomeTab
              stories={stories}
              activeGenre={activeGenre}
              setActiveGenre={setActiveGenre}
              contentType={contentType}
              setContentType={setContentType}
              onPlay={handlePlay}
              loading={loading}
            />
          )}
          {activeTab === 'library' && (
            <LibraryTab stories={stories} onPlay={handlePlay} loading={loading} />
          )}
          {activeTab === 'profile' && <ProfileTab />}
          {activeTab === 'admin' && (
            <AdminTab
              onStoryPublished={handleStoryPublished}
              supabaseReady={supabaseReady}
            />
          )}
        </main>

        {/* Audio Player (bottom) */}
        <AudioPlayer
          currentTrack={currentTrack}
          onClose={() => { setCurrentTrack(null); }}
        />

        <BottomNav
          activeTab={activeTab}
          setActiveTab={setActiveTab}
          hasSupabase={supabaseReady}
        />
      </div>
    );
  }

  // ============ RENDER ============
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
