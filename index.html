  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      color: #ffffff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .active-tab {
      position: relative;
    }
    .active-tab::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      border-radius: 2px;
      background: #3b82f6;
    }

    .pill-active {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .neon-glow {
      text-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
      50% { box-shadow: 0 0 35px rgba(59, 130, 246, 0.35); }
    }

    .tab-content {
      animation: fadeSlideUp 0.35s ease-out;
    }

    .hero-card {
      animation: fadeIn 0.5s ease-out, pulseGlow 3s ease-in-out infinite;
    }

    .toggle-checkbox:checked + .toggle-label {
      background: #3b82f6;
    }
    .toggle-checkbox:checked + .toggle-label .toggle-dot {
      transform: translateX(100%);
    }

    .rank-number {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bottom-nav-item.active .nav-icon {
      color: #3b82f6;
    }

    .star-rating {
      color: #f59e0b;
    }

    .badge-new {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }
  </style>
</head>

              key={g}
              onClick={() => setActiveGenre(g)}
              className={`flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium transition-all border ${
                activeGenre === g
                  ? 'bg-blue-500 text-white border-blue-500 shadow-md shadow-blue-500/25'
                  : 'bg-[#121212] text-gray-400 border-white/5 hover:border-white/10 hover:text-white'
              }`}
            >
              {g}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // -- Star Rating --
  function StarRating({ rating, size = 'small' }) {
    const starSize = size === 'small' ? 'w-3 h-3' : 'w-3.5 h-3.5';
    return (
      <div className="flex items-center gap-1">
        <Icons.Star className={`${starSize} text-amber-400`} />
        <span className="text-xs font-semibold text-amber-400">{rating.toFixed(1)}</span>
      </div>
    );
  }

  // -- Featured Hero --
  function HeroBanner({ story }) {
    return (
      <div className="relative mb-6 rounded-2xl overflow-hidden hero-card">
        <div className={`absolute inset-0 bg-gradient-to-r ${story.gradient} opacity-60`} />
        <img
          src={story.image}
          alt={story.title}
          className="w-full h-[190px] sm:h-[220px] object-cover"
        />
        <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent" />
        <div className="absolute bottom-0 left-0 right-0 p-5">
          <div className="flex items-center gap-2 mb-2">
            <span className="px-2.5 py-0.5 rounded-full bg-blue-500/20 text-blue-400 text-[10px] font-semibold border border-blue-500/30">
              Featured
            </span>
            <span className="px-2.5 py-0.5 rounded-full bg-red-500/20 text-red-400 text-[10px] font-semibold border border-red-500/30">
              Horror
            </span>
          </div>
          <h2 className="text-xl font-extrabold text-white tracking-tight mb-0.5">{story.title}</h2>
          <p className="text-xs text-gray-400 mb-1">by {story.author}</p>
          <div className="flex items-center gap-3 mb-3">
            <StarRating rating={story.rating} />
            <span className="text-xs text-gray-500">{story.totalListens} listens</span>
            <span className="text-xs text-gray-500">{story.episodes} EP</span>
          </div>
          <button className="flex items-center gap-2 px-6 py-2.5 bg-white text-black font-bold rounded-xl text-sm hover:bg-gray-100 transition-all shadow-xl shadow-white/10">
            <Icons.Headphones className="w-4 h-4" />
            Listen Now
          </button>
        </div>
      </div>
    );
  }

  // -- Horizontal Scroll Section --
  function HorizontalScrollSection({ title, items, type = 'vertical' }) {
    return (
      <div className="mb-6">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-base font-bold text-white">{title}</h3>
          <button className="text-blue-400 text-xs font-medium hover:text-blue-300 transition-colors">See All</button>
        </div>
        <div className="flex gap-3 overflow-x-auto scrollbar-hide -mx-4 px-4 pb-1">
          {items.map(item => (
            <div key={item.id} className="flex-shrink-0 relative group cursor-pointer">
              {/* Artwork */}
              <div className="relative overflow-hidden rounded-xl" style={{ width: type === 'vertical' ? 130 : 150 }}>
                <img
                  src={item.image}
                  alt={item.title}
                  className={`object-cover ${
                    type === 'vertical' ? 'w-[130px] h-[180px]' : 'w-[150px] h-[110px]'
                  } rounded-xl`}
                />
                {/* Progress bar for recently listened */}
                {item.progress !== undefined && (
                  <div className="absolute bottom-0 left-0 right-0 h-1 bg-white/10">
                    <div
                      className="h-full bg-blue-500 rounded-r-full"
                      style={{ width: `${item.progress}%` }}
                    />
                  </div>
                )}
                {/* Continue overlay */}
                {item.progress !== undefined && (
                  <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-xl">
                    <div className="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/40">
                      <Icons.Continue className="w-5 h-5 text-white ml-0.5" />
                    </div>
                  </div>
                )}
                {/* New badge */}
                {item.isNew && (
                  <span className="absolute top-2 left-2 px-1.5 py-0.5 rounded-md bg-blue-500 text-white text-[8px] font-bold tracking-wide shadow-lg">
                    New EP
                  </span>
                )}
              </div>
              {/* Info */}
              <div className="mt-2 max-w-[130px]">
                <p className="text-[13px] font-semibold text-white truncate">{item.title}</p>
                <p className="text-[10px] text-gray-500 truncate">{item.author}</p>
                {item.rating && <StarRating rating={item.rating} />}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // -- Rank List Item --
  function RankListItem({ item, index }) {
    return (
      <div className="flex items-center gap-3 py-3 border-b border-white/5 last:border-0 cursor-pointer hover:bg-white/[0.02] transition-colors rounded-lg px-2 -mx-2">
        <span className="text-2xl font-extrabold w-8 text-center rank-number">{String(item.rank).padStart(2, '0')}</span>
        <img src={item.image} alt={item.title} className="w-14 h-14 rounded-xl object-cover flex-shrink-0" />
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-white truncate">{item.title}</p>
          <p className="text-[11px] text-gray-500 truncate">{item.author}</p>
          <div className="flex items-center gap-3 mt-0.5">
            <StarRating rating={item.rating} />
            <span className="flex items-center gap-1 text-[10px] text-gray-500">
              <Icons.Listens className="w-3 h-3" />
              {item.listens}
            </span>
          </div>
        </div>
        <div className="flex flex-col items-end gap-0.5">
          <span className="text-[10px] text-gray-600">{item.episodes} EP</span>
          <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
        </div>
      </div>
    );
  }

  // -- Home Tab --
  function HomeTab({ activeGenre, setActiveGenre, contentType, setContentType }) {
    return (
      <div className="tab-content">
        <GenrePills
          activeGenre={activeGenre}
          setActiveGenre={setActiveGenre}
          contentType={contentType}
          setContentType={setContentType}
        />
        <HeroBanner story={featuredStory} />
        <HorizontalScrollSection title="Recently Listened" items={recentlyListened} type="horizontal" />
        <HorizontalScrollSection title="New Audio Stories" items={newAudioStories} type="vertical" />
        <HorizontalScrollSection title="New Episodes" items={newEpisodes} type="vertical" />
        {/* Rankings section within home */}
        <div className="mb-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-base font-bold text-white">Top Charts</h3>
            <button className="text-blue-400 text-xs font-medium">See All</button>
          </div>
          <div className="bg-[#121212] rounded-2xl p-3 border border-white/5">
            {rankList.slice(0, 5).map((item, i) => (
              <RankListItem key={item.rank} item={item} index={i} />
            ))}
          </div>
        </div>
        <div className="h-8" />
      </div>
    );
  }

  // -- Library / Ranking Tab --
  function LibraryTab() {
    return (
      <div className="tab-content">
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-xl font-bold text-white">Top Charts</h2>
          <span className="text-xs text-gray-500 bg-[#121212] px-3 py-1 rounded-full">This Week</span>
        </div>
        <div className="bg-[#121212] rounded-2xl p-4 border border-white/5">
          {rankList.map((item, i) => (
            <RankListItem key={item.rank} item={item} index={i} />
          ))}
        </div>
        <div className="h-8" />
      </div>
    );
  }

  // -- Profile Tab --
  function ProfileTab() {
    const [writerMode, setWriterMode] = useState(false);
    const [darkMode, setDarkMode] = useState(true);

    return (
      <div className="tab-content">
        {/* User Header */}
        <div className="flex items-center gap-4 mb-8 mt-2">
          <div className="relative">
            <div className="w-20 h-20 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-2xl font-bold text-white shadow-xl shadow-blue-500/20">
              M
            </div>
            <div className="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-blue-500 border-2 border-black flex items-center justify-center cursor-pointer hover:scale-105 transition-transform">
              <Icons.Pencil className="w-3.5 h-3.5 text-white" />
            </div>
          </div>
          <div>
            <h2 className="text-xl font-bold text-white">MJAVED</h2>
            <p className="text-xs text-gray-500">Member since 2025</p>
          </div>
        </div>

        {/* Stats */}
        <div className="flex gap-4 mb-6">
          {[
            { label: 'Library', value: '24' },
            { label: 'Listened', value: '142' },
            { label: 'Downloads', value: '38' },
          ].map(s => (
            <div key={s.label} className="flex-1 bg-[#121212] rounded-xl border border-white/5 p-3 text-center">
              <p className="text-lg font-bold text-white">{s.value}</p>
              <p className="text-[10px] text-gray-500">{s.label}</p>
            </div>
          ))}
        </div>

        {/* Settings */}
        <div className="bg-[#121212] rounded-2xl border border-white/5 overflow-hidden mb-4">
          {/* Writer Mode */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5">
            <div>
              <p className="text-sm font-medium text-white">Writer Mode (लेखक मोड)</p>
              <p className="text-[10px] text-gray-500">Create & manage your stories</p>
            </div>
            <label className="relative inline-flex items-center cursor-pointer">
              <input
                type="checkbox"
                checked={writerMode}
                onChange={() => setWriterMode(!writerMode)}
                className="sr-only peer"
              />
              <div className="w-11 h-6 bg-[#2a2a2a] rounded-full peer peer-checked:bg-blue-500 transition-colors after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full" />
            </label>
          </div>

          {/* Dark Mode */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5">
            <div>
              <p className="text-sm font-medium text-white">Dark Mode (डार्क मोड)</p>
              <p className="text-[10px] text-gray-500">Always on for premium experience</p>
            </div>
            <label className="relative inline-flex items-center cursor-pointer">
              <input
                type="checkbox"
                checked={darkMode}
                onChange={() => setDarkMode(!darkMode)}
                className="sr-only peer"
              />
              <div className="w-11 h-6 bg-blue-500 rounded-full peer-checked:bg-blue-500 transition-colors after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full" />
            </label>
          </div>

          {/* Language */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5 cursor-pointer hover:bg-white/[0.02] transition-colors">
            <div>
              <p className="text-sm font-medium text-white">Language (भाषा)</p>
              <p className="text-[10px] text-gray-500">English • हिंदी</p>
            </div>
            <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
          </div>

          {/* Help & Support */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5 cursor-pointer hover:bg-white/[0.02] transition-colors">
            <p className="text-sm font-medium text-white">Help & Support (सहायता)</p>
            <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
          </div>

          {/* Privacy */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5 cursor-pointer hover:bg-white/[0.02] transition-colors">
            <p className="text-sm font-medium text-white">Privacy Policy & Terms</p>
            <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
          </div>

          {/* Logout */}
          <div className="px-4 py-3.5">
            <button className="flex items-center gap-2 text-red-400 text-sm font-medium hover:text-red-300 transition-colors">
              <Icons.Logout className="w-4 h-4" />
              Logout (लॉग आउट)
            </button>
          </div>
        </div>

        {/* Version */}
        <p className="text-center text-[10px] text-gray-600 mb-20">All Story FF v2.1.0</p>
      </div>
    );
  }

  // ============ APP ============
  function App() {
    const [activeTab, setActiveTab] = useState('home');
    const [searchQuery, setSearchQuery] = useState('');
    const [activeGenre, setActiveGenre] = useState('✨ All');
    const [contentType, setContentType] = useState('audio');

    // Track if the search is active (for styling)
    const [searchFocused, setSearchFocused] = useState(false);

    return (
      <div className="min-h-screen bg-black text-white">
        <TopHeader searchQuery={searchQuery} setSearchQuery={setSearchQuery} />

        {/* Main Content Area */}
        <main className="pt-[68px] pb-[68px] px-4 max-w-2xl mx-auto">
          {activeTab === 'home' && (
            <HomeTab
              activeGenre={activeGenre}
              setActiveGenre={setActiveGenre}
              contentType={contentType}
              setContentType={setContentType}
            />
          )}
          {activeTab === 'library' && <LibraryTab />}
          {activeTab === 'profile' && <ProfileTab />}
        </main>

        <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
      </div>
    );
  }

  // ============ RENDER ============
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
